version: 2
updates:
  - package-ecosystem: uv
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
      - area:backend
    groups:
      backend-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "05:15"
      timezone: Europe/Berlin
    labels:
      - dependencies
      - area:frontend
    groups:
      frontend-dependencies:
        patterns:
          - "*"
