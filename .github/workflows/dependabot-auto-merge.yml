name: Dependabot Auto Merge

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    name: Auto-approve and enable auto-merge
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Approve Dependabot PR and enable auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests || [];
            if (prs.length === 0) {
              core.info("Workflow run is not associated with a pull request.");
              return;
            }

            const prNumber = prs[0].number;
            const { owner, repo } = context.repo;
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            const author = (pr.user?.login || "").toLowerCase();
            const isDependabot = pr.user?.type === "Bot" && author.includes("dependabot");
            if (!isDependabot) {
              core.info(`PR #${pr.number} is not authored by Dependabot.`);
              return;
            }

            if (pr.state !== "open" || pr.draft) {
              core.info(`PR #${pr.number} is not open for auto-merge.`);
              return;
            }

            if (!["clean", "has_hooks", "unstable"].includes((pr.mergeable_state || "").toLowerCase())) {
              core.info(`PR #${pr.number} has mergeable_state=${pr.mergeable_state}; skipping.`);
              return;
            }

            try {
              await github.rest.pulls.createReview({
                owner,
                repo,
                pull_number: pr.number,
                event: "APPROVE",
              });
            } catch (error) {
              core.info(`Approval step skipped: ${error.message}`);
            }

            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: pr.number,
                merge_method: "squash",
              });
              core.info(`Merged PR #${pr.number}.`);
            } catch (error) {
              core.info(`Merge step skipped: ${error.message}`);
            }
