services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hatchery-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:?Set DATABASE_URL in .env}
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env}
      - PANEL_API_KEY_ENCRYPTION_SECRET=${PANEL_API_KEY_ENCRYPTION_SECRET:?Set PANEL_API_KEY_ENCRYPTION_SECRET in .env}
      - CURSEFORGE_API_KEY=${CURSEFORGE_API_KEY:-}
      - ZITADEL_DOMAIN=${ZITADEL_DOMAIN:-auth.example.com}
      - ZITADEL_PROJECT_ID=${ZITADEL_PROJECT_ID:?Set ZITADEL_PROJECT_ID in .env}
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:3000","http://localhost:5173"]}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-}
        - VITE_ZITADEL_AUTHORITY=${VITE_ZITADEL_AUTHORITY:?Set VITE_ZITADEL_AUTHORITY in .env}
        - VITE_ZITADEL_CLIENT_ID=${VITE_ZITADEL_CLIENT_ID:?Set VITE_ZITADEL_CLIENT_ID in .env}
        - VITE_ZITADEL_REDIRECT_URI=${VITE_ZITADEL_REDIRECT_URI:?Set VITE_ZITADEL_REDIRECT_URI in .env}
        - VITE_ZITADEL_POST_LOGOUT_URI=${VITE_ZITADEL_POST_LOGOUT_URI:?Set VITE_ZITADEL_POST_LOGOUT_URI in .env}
    container_name: hatchery-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: hatchery-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hatchery}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-hatchery}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hatchery} -d ${POSTGRES_DB:-hatchery}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  newt:
    image: docker.io/fosrl/newt:latest
    container_name: hatchery-newt
    restart: unless-stopped
    profiles: ["pangolin"]
    env_file:
      - .env
    environment:
      PANGOLIN_ENDPOINT: ${PANGOLIN_ENDPOINT}
      NEWT_ID: ${NEWT_ID}
      NEWT_SECRET: ${NEWT_SECRET}
    depends_on:
      - frontend

volumes:
  postgres_data:
